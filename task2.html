<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Information Form</title>
    <style>
        body{
        font-family: Arial, sans-serif;
        background-color: #ffffff;
        display: flex;
        justify-content: center;
        margin-top: 50px;
        }

        .user-box {
            background-color: #ffffff;
            padding: 25px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 420px;
        }

        fieldset {
            border: 2px solid #000000;
            width: 450px;
            padding: 20px 30px;
        }

        legend {
            font-weight: bold;
            font-size: 16px;
            padding: 0 5px;
        }

        .input-section {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .highlight-input {
            background-color: #e8f0fe;
        }

        .gender-section {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        .gender-section label {
            display: inline;
            margin: 0;
            cursor: pointer;
        }

        textarea {
            resize: vertical;
            height: 60px;
        }

        button {
            background-color: #e1e1e1;
            color: #000000;
            border: 1px solid #000000;
            padding: 6px 15px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background-color: #d4d4d4;
        }
    </style>
</head>

<body>

    <div class="user-box">

        <form action="" method="POST">

            <fieldset>

                <legend>User personal information</legend>

                <div class="input-section">
                    <label for="fullName">Enter full name</label>
                    <input type="text" id="fullName" class="highlight-input" value="Rahul Kumar" name="full_name">
                </div>

                <div class="input-section">
                    <label for="userEmail">Enter your email</label>
                    <input type="email" id="userEmail" class="highlight-input" value="geeks@12345gmail.com" name="email_address">
                </div>

                <div class="input-section">
                    <label for="userPass">Enter your password</label>
                    <input type="password" id="userPass" name="password">
                </div>

                <div class="input-section">
                    <label for="confirmPass">Confirm your password</label>
                    <input type="password" id="confirmPass" name="confirm_password">
                </div>

                <div class="input-section">
                    <label>Enter your gender</label>

                    <div class="gender-section">
                        <label>
                            <input type="radio" name="gender_type" value="male" checked>
                            Male
                        </label>

                        <label>
                            <input type="radio" name="gender_type" value="female">
                            Female
                        </label>

                        <label>
                            <input type="radio" name="gender_type" value="neutral">
                            Neutral
                        </label>
                    </div>
                </div>

                <div class="input-section">
                    <label for="birthDate">Enter your Date of Birth</label>
                    <input type="date" id="birthDate" value="2009-06-10" name="dob">
                </div>

                <div class="input-section">
                    <label for="userAddress">Enter your address:</label>
                    <textarea id="userAddress" name="address">Noida sector 137</textarea>
                </div>

                <button type="submit">Submit</button>

            </fieldset>

        </form>

    </div>

</body>
</html>
