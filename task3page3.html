<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(235, 241, 245, 0.9), rgba(245, 247, 250, 0.95)), url('https://unsplash.com') no-repeat center center;
            background-size: cover;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 2px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .logo {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1a365d;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo::before {
            content: "📋";
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 8px 12px;
            transition: color 0.2s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #ff9f43;
            border-bottom: 2px solid #ff9f43;
        }

        .container {
            flex: 1;
            padding: 80px 40px;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 50px;
            color: #1a365d;
            letter-spacing: -0.5px;
        }

        .schedule-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .schedule-table th,
        .schedule-table td {
            padding: 18px;
            text-align: center;
            font-size: 1rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .schedule-table th {
            background-color: #1a365d;
            color: #ffffff;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .schedule-table td {
            color: #475569;
            font-weight: 500;
        }

        .schedule-table tr:nth-child(even) {
            background-color: #f8fafc;
        }

        .schedule-table tr:last-child td {
            border-bottom: none;
        }

        .schedule-table tr:hover td {
            color: #ff9f43;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="logo">ABC Training Institute</div>
        <ul class="nav-links">
            <li><a href="home.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="schedule.html" class="active">Schedule</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Course Schedule</h1>

        <table class="schedule-table">
            <thead>
                <tr>
                    <th>Course</th>
                    <th>Trainer</th>
                    <th>Duration</th>
                    <th>Mode</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>HTML & CSS</td>
                    <td>Ashoka</td>
                    <td>2 Weeks</td>
                    <td>Online</td>
                </tr>
                <tr>
                    <td>Java</td>
                    <td>Ms. Rahul</td>
                    <td>4 Weeks</td>
                    <td>Offline</td>
                </tr>
                <tr>
                    <td>React JS</td>
                    <td>Mr. Anita</td>
                    <td>3 Weeks</td>
                    <td>Online</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
