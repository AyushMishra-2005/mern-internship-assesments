<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillForge Academy</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(235, 241, 245, 0.9), rgba(245, 247, 250, 0.95)), url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200') no-repeat center center;
            background-size: cover;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top Navigation Section */
        .top-bar {
            background-color: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            border-bottom: 2px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .brand-name {
            font-size: 1.35rem;
            font-weight: 700;
            color: #1a365d;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-name::before {
            content: "🎓";
        }

        .menu-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .menu-links a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            padding: 8px 12px;
            transition: color 0.2s;
        }

        .menu-links a:hover,
        .menu-links a.current {
            color: #ff9f43;
            border-bottom: 2px solid #ff9f43;
        }

        /* Main Hero Area */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 60px 40px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            color: #1a365d;
            letter-spacing: -0.5px;
            margin-bottom: 15px;
        }

        .tagline {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 45px;
        }

        /* Multimedia Display Card */
        .media-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            width: 460px;
            max-width: 100%;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        .display-screen {
            background:
                url('https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200') no-repeat center center;

            background-size: cover;
            height: 200px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #e2e8f0;
            overflow: hidden;
        }

        .banner-text {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #ffffff;
            background: rgba(26, 54, 93, 0.85);
            padding: 10px 20px;
            border-radius: 6px;
        }

        .media-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;

            background: rgba(255, 255, 255, 0.95);

            display: flex;
            align-items: center;
            padding: 10px 16px;

            font-size: 0.8rem;
            color: #475569;
            border-top: 1px solid #e2e8f0;
        }

        .play-icon {
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-left: 10px solid #1a365d;
            border-bottom: 6px solid transparent;
            margin-right: 12px;
        }

        .timeline-bar {
            flex: 1;
            height: 4px;
            background: #e2e8f0;
            margin: 0 12px;
            position: relative;
            border-radius: 2px;
        }

        .timeline-bar::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 45%;
            height: 100%;
            background: #ff9f43;
            border-radius: 2px;
        }

        audio {
            width: 100%;
            height: 36px;
            outline: none;
        }
    </style>
</head>

<body>

    <nav class="top-bar">

        <div class="brand-name">
            SkillForge Academy
        </div>

        <ul class="menu-links">
            <li><a href="home.html" class="current">Dashboard</a></li>
            <li><a href="courses.html">Programs</a></li>
            <li><a href="schedule.html">Timetable</a></li>
        </ul>

    </nav>

    <section class="hero-section">

        <h1>Welcome to SkillForge Academy</h1>

        <p class="tagline">
            Building Skills for Tomorrow's Opportunities
        </p>

        <div class="media-card">

            <div class="display-screen">

                <div class="banner-text">
                    MASTER TECHNOLOGY
                </div>

                <div class="media-controls">

                    <div class="play-icon"></div>

                    <div class="timeline-bar"></div>

                    <span>
                        🔊 &nbsp; ⚙ &nbsp; ⛶
                    </span>

                </div>

            </div>

            <audio controls>
                <source src="https://soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

        </div>

    </section>

</body>

</html>
